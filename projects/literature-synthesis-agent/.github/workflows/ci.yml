name: CI — literature-synthesis-agent

on:
  push:
    branches: [main]
    paths: ['projects/literature-synthesis-agent/**']
  pull_request:
    branches: [main]
    paths: ['projects/literature-synthesis-agent/**']

defaults:
  run:
    working-directory: projects/literature-synthesis-agent

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install ruff mypy
      - run: ruff check src/ tests/
      - run: mypy src/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install uv && uv pip install --system ".[dev]"
      - run: pytest tests/unit/ -v
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: projects/literature-synthesis-agent/coverage.xml

  scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/python p/owasp-top-ten

  build:
    runs-on: ubuntu-latest
    needs: [test, scan]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: projects/literature-synthesis-agent
          push: false
          tags: literature-synthesis-agent:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
