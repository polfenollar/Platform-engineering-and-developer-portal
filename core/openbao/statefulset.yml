# ==============================================================================
# Phase 1: OpenBao HA StatefulSet
# Migrated to StatefulSet with 3 replicas and dynamic PVCs.
# Dev mode retained as requested (auto-unseal active).
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openbao-auth-delegator
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openbao
    namespace: platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
data:
  openbao.hcl: |
    ui = true

    listener "tcp" {
      address     = "0.0.0.0:8200"
      cluster_address = "0.0.0.0:8201"
      tls_disable = 1
    }

    storage "raft" {
      path = "/openbao/data"
      retry_join {
        leader_api_addr = "http://openbao-0.openbao-internal.platform.svc.cluster.local:8200"
      }
      retry_join {
        leader_api_addr = "http://openbao-1.openbao-internal.platform.svc.cluster.local:8200"
      }
      retry_join {
        leader_api_addr = "http://openbao-2.openbao-internal.platform.svc.cluster.local:8200"
      }
    }

    api_addr     = "http://openbao.platform.svc.cluster.local:8200"
    cluster_addr = "https://openbao.platform.svc.cluster.local:8201"
---
apiVersion: v1
kind: Service
metadata:
  name: openbao-internal
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
spec:
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openbao
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
spec:
  serviceName: openbao-internal
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao
        app.kubernetes.io/part-of: platform
    spec:
      serviceAccountName: openbao
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: openbao
          image: openbao/openbao:2.0.3
          command:
            - bao
            - server
            - -dev                         # Auto-unseal explicitly requested
            - -dev-root-token-id=root
            - -dev-listen-address=0.0.0.0:8200
            - -config=/openbao/config/openbao.hcl
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster
          env:
            - name: BAO_LOG_LEVEL
              value: "info"
            - name: BAO_LOG_FORMAT
              value: "json"
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&perfstandbyok=true
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /openbao/config
            - name: data
              mountPath: /openbao/data
      volumes:
        - name: config
          configMap:
            name: openbao-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# ==============================================================================
# OpenBao Init Job
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-init-secrets
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao-init
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: openbao/openbao:2.0.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              export BAO_ADDR=http://openbao.platform.svc.cluster.local:8200
              export BAO_TOKEN=root

              echo "⏳ Waiting for OpenBao to be ready..."
              until bao status 2>/dev/null; do sleep 2; done

              echo "🔑 Seeding secrets into OpenBao KV store..."
              bao secrets enable -path=secret kv-v2 2>/dev/null || true

              bao kv put secret/platform/flipt-db POSTGRES_PASSWORD="${FLIPT_DB_PASSWORD}"
              bao kv put secret/platform/litellm OPENAI_API_KEY="${OPENAI_API_KEY}" ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" GEMINI_API_KEY="${GEMINI_API_KEY}" LITELLM_MASTER_KEY="${LITELLM_MASTER_KEY}"
              bao kv put secret/platform/litellm-db POSTGRES_PASSWORD="${LITELLM_DB_PASSWORD}"
              bao kv put secret/platform/github token="${GITHUB_TOKEN}"

              echo "✅ All secrets seeded successfully"
          env:
            - name: FLIPT_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: flipt-db-password } }
            - name: OPENAI_API_KEY
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: openai-api-key } }
            - name: ANTHROPIC_API_KEY
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: anthropic-api-key } }
            - name: GEMINI_API_KEY
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: gemini-api-key } }
            - name: LITELLM_MASTER_KEY
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: litellm-master-key } }
            - name: LITELLM_DB_PASSWORD
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: litellm-db-password } }
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: bootstrap-secrets, key: github-token } }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: 200m, memory: 128Mi }
