# Reusable — E2E test workflow
# Source of truth: platform/github-actions/test-e2e.yml (kept in sync)

name: E2E Tests

on:
  workflow_call:
    inputs:
      project:
        description: 'Project to test (veyor or biomedical)'
        required: true
        type: string

jobs:
  test-e2e-veyor:
    name: Veyor E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: inputs.project == 'veyor'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          cd projects/veyor-marketplace/frontend
          npm ci
          npx playwright install --with-deps chromium
      - name: Start dev server
        run: |
          cd projects/veyor-marketplace/frontend
          npm run dev &
          npx wait-on http://localhost:3000 --timeout 60000
      - name: Run Playwright tests
        run: |
          cd projects/veyor-marketplace/frontend
          npx playwright test --reporter=html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: projects/veyor-marketplace/frontend/playwright-report/

  test-e2e-biomedical:
    name: BioMedical E2E Tests (API)
    runs-on: ubuntu-latest
    if: inputs.project == 'biomedical'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run API E2E tests
        run: |
          cd projects/literature-synthesis-agent
          pip install -e ".[test]"
          python -m pytest tests/e2e/ -v --timeout=300
