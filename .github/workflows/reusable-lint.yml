# Reusable — Multi-language lint workflow
# Source of truth: platform/github-actions/lint.yml (kept in sync)

name: Lint

on:
  workflow_call:
    inputs:
      project:
        description: 'Project to lint (veyor or biomedical)'
        required: true
        type: string

jobs:
  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    if: inputs.project == 'veyor'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: projects/veyor-marketplace/frontend/package-lock.json
      - run: cd projects/veyor-marketplace/frontend && npm ci
      - run: cd projects/veyor-marketplace/frontend && npx eslint . --ext .ts,.tsx --max-warnings 0

  lint-java:
    name: Lint Java
    runs-on: ubuntu-latest
    if: inputs.project == 'veyor'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
      - run: cd projects/veyor-marketplace/backend && ./gradlew checkstyleMain checkstyleTest

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install ruff mypy
      - name: Lint Veyor Agents
        if: inputs.project == 'veyor'
        run: |
          if [ -d "projects/veyor-marketplace/agents" ]; then
            cd projects/veyor-marketplace/agents && ruff check . && ruff format --check .
          else
            echo "agents not yet in repo, skipping"
          fi
      - name: Lint BioMedical
        if: inputs.project == 'biomedical'
        run: |
          cd projects/literature-synthesis-agent
          ruff check src/ tests/
          ruff format --check src/ tests/

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    if: inputs.project == 'veyor'
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Lint Go services
        run: |
          for svc in quoting-service carrier-simulator; do
            dir="projects/veyor-marketplace/$svc"
            if [ -d "$dir" ]; then
              echo "Linting $svc..."
              cd "$dir" && golangci-lint run && cd -
            else
              echo "$svc not yet in repo, skipping"
            fi
          done

  lint-helm:
    name: Lint Helm Charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - run: |
          for chart in platform/kubernetes/charts/*/; do
            echo "Linting $chart..."
            helm lint "$chart"
          done

  lint-terraform:
    name: Lint Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive platform/terraform/
      - uses: terraform-linters/setup-tflint@v4
      - run: |
          cd platform/terraform
          tflint --init
          tflint --recursive
