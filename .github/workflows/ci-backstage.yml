# Backstage Portal CI
# Runs on any change to the Backstage app or catalog

name: Backstage CI

on:
  push:
    branches: [main]
    paths:
      - 'backstage-app/**'
      - 'backstage/**'
  pull_request:
    branches: [main]
    paths:
      - 'backstage-app/**'
      - 'backstage/**'

defaults:
  run:
    working-directory: backstage-app

jobs:
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack (Yarn)
        run: corepack enable
      - name: Get Yarn cache path
        id: yarn-cache
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: yarn-${{ hashFiles('backstage-app/yarn.lock') }}
          restore-keys: yarn-
      - run: yarn install --immutable

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/cache@v4
        with:
          path: $(yarn config get cacheFolder)
          key: yarn-${{ hashFiles('backstage-app/yarn.lock') }}
          restore-keys: yarn-
      - run: yarn install --immutable
      - run: yarn lint:all

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/cache@v4
        with:
          path: $(yarn config get cacheFolder)
          key: yarn-${{ hashFiles('backstage-app/yarn.lock') }}
          restore-keys: yarn-
      - run: yarn install --immutable
      - run: yarn tsc

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/cache@v4
        with:
          path: $(yarn config get cacheFolder)
          key: yarn-${{ hashFiles('backstage-app/yarn.lock') }}
          restore-keys: yarn-
      - run: yarn install --immutable
      - run: yarn test:all --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Enable Corepack
        run: corepack enable
      - uses: actions/cache@v4
        with:
          path: $(yarn config get cacheFolder)
          key: yarn-${{ hashFiles('backstage-app/yarn.lock') }}
          restore-keys: yarn-
      - run: yarn install --immutable
      - run: yarn build:all
      - uses: actions/upload-artifact@v4
        with:
          name: backstage-dist
          path: backstage-app/packages/backend/dist/
          retention-days: 7
