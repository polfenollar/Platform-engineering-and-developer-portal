# CI/CD Pipeline — Main orchestrator
# Detects which project changed and runs the appropriate pipeline.
# On push to main: lint → test → sast → build → deploy dev → e2e → staging → prod
# On PR:           lint → test → sast → build (no push, no deploy)

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================================
  # Detect which project(s) changed
  # ============================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      veyor: ${{ steps.filter.outputs.veyor }}
      biomedical: ${{ steps.filter.outputs.biomedical }}
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            veyor:
              - 'projects/veyor-marketplace/**'
              - 'platform/kubernetes/charts/veyor-*/**'
              - 'platform/kubernetes/docker/veyor/**'
            biomedical:
              - 'projects/literature-synthesis-agent/**'
              - 'platform/kubernetes/charts/biomedical-*/**'
              - 'platform/kubernetes/docker/biomedical/**'
            platform:
              - 'platform/**'
              - '.github/**'

  # ============================================================
  # Lint
  # ============================================================
  lint-veyor:
    name: Lint / Veyor
    needs: changes
    if: needs.changes.outputs.veyor == 'true'
    uses: ./.github/workflows/reusable-lint.yml
    with:
      project: veyor

  lint-biomedical:
    name: Lint / BioMedical
    needs: changes
    if: needs.changes.outputs.biomedical == 'true'
    uses: ./.github/workflows/reusable-lint.yml
    with:
      project: biomedical

  # ============================================================
  # Unit Tests
  # ============================================================
  test-veyor:
    name: Unit Tests / Veyor
    needs: [changes, lint-veyor]
    if: needs.changes.outputs.veyor == 'true'
    uses: ./.github/workflows/reusable-test-unit.yml
    with:
      project: veyor

  test-biomedical:
    name: Unit Tests / BioMedical
    needs: [changes, lint-biomedical]
    if: needs.changes.outputs.biomedical == 'true'
    uses: ./.github/workflows/reusable-test-unit.yml
    with:
      project: biomedical

  # ============================================================
  # Integration Tests
  # ============================================================
  integration-veyor:
    name: Integration Tests / Veyor
    needs: [changes, test-veyor]
    if: needs.changes.outputs.veyor == 'true'
    uses: ./.github/workflows/reusable-test-integration.yml
    with:
      project: veyor

  integration-biomedical:
    name: Integration Tests / BioMedical
    needs: [changes, test-biomedical]
    if: needs.changes.outputs.biomedical == 'true'
    uses: ./.github/workflows/reusable-test-integration.yml
    with:
      project: biomedical

  # ============================================================
  # SAST (runs in parallel with tests)
  # ============================================================
  sast-veyor:
    name: SAST / Veyor
    needs: changes
    if: needs.changes.outputs.veyor == 'true'
    uses: ./.github/workflows/reusable-sast-scan.yml
    with:
      project: veyor

  sast-biomedical:
    name: SAST / BioMedical
    needs: changes
    if: needs.changes.outputs.biomedical == 'true'
    uses: ./.github/workflows/reusable-sast-scan.yml
    with:
      project: biomedical

  # ============================================================
  # Docker Build — push only on merge to main
  # ============================================================
  build-veyor:
    name: Build / Veyor
    needs: [changes, integration-veyor, sast-veyor]
    if: |
      always() &&
      needs.changes.outputs.veyor == 'true' &&
      needs.integration-veyor.result != 'failure' &&
      needs.sast-veyor.result != 'failure'
    uses: ./.github/workflows/reusable-build-docker.yml
    with:
      project: veyor
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      registry: ghcr.io
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  build-biomedical:
    name: Build / BioMedical
    needs: [changes, integration-biomedical, sast-biomedical]
    if: |
      always() &&
      needs.changes.outputs.biomedical == 'true' &&
      needs.integration-biomedical.result != 'failure' &&
      needs.sast-biomedical.result != 'failure'
    uses: ./.github/workflows/reusable-build-docker.yml
    with:
      project: biomedical
      push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      registry: ghcr.io
    secrets:
      REGISTRY_USERNAME: ${{ github.actor }}
      REGISTRY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Deploy → Dev (automatic on push to main)
  # Requires secret: KUBECONFIG_DEV
  # ============================================================
  deploy-veyor-dev:
    name: Deploy / Veyor / Dev
    needs: build-veyor
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-veyor.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project: veyor
      environment: dev
      image_tag: ${{ github.sha }}
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG_DEV }}

  deploy-biomedical-dev:
    name: Deploy / BioMedical / Dev
    needs: build-biomedical
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.build-biomedical.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project: biomedical
      environment: dev
      image_tag: ${{ github.sha }}
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG_DEV }}

  # ============================================================
  # DAST Security Scanning (after dev deploy)
  # ============================================================
  dast-veyor:
    name: DAST / Veyor
    needs: deploy-veyor-dev
    if: needs.deploy-veyor-dev.result == 'success'
    uses: ./.github/workflows/reusable-dast-scan.yml
    with:
      project: veyor
      target_url: 'http://localhost:3000'

  dast-biomedical:
    name: DAST / BioMedical
    needs: deploy-biomedical-dev
    if: needs.deploy-biomedical-dev.result == 'success'
    uses: ./.github/workflows/reusable-dast-scan.yml
    with:
      project: biomedical
      target_url: 'http://localhost:8000'

  # ============================================================
  # E2E Tests (after dev deploy)
  # ============================================================
  e2e-veyor:
    name: E2E / Veyor
    needs: deploy-veyor-dev
    if: needs.deploy-veyor-dev.result == 'success'
    uses: ./.github/workflows/reusable-test-e2e.yml
    with:
      project: veyor

  e2e-biomedical:
    name: E2E / BioMedical
    needs: deploy-biomedical-dev
    if: needs.deploy-biomedical-dev.result == 'success'
    uses: ./.github/workflows/reusable-test-e2e.yml
    with:
      project: biomedical

  # ============================================================
  # Deploy → Staging (requires GitHub Environment approval)
  # ============================================================
  deploy-veyor-staging:
    name: Deploy / Veyor / Staging
    needs: [e2e-veyor, dast-veyor]
    if: |
      always() &&
      needs.e2e-veyor.result == 'success' &&
      needs.dast-veyor.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project: veyor
      environment: staging
      image_tag: ${{ github.sha }}
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}

  deploy-biomedical-staging:
    name: Deploy / BioMedical / Staging
    needs: [e2e-biomedical, dast-biomedical]
    if: |
      always() &&
      needs.e2e-biomedical.result == 'success' &&
      needs.dast-biomedical.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project: biomedical
      environment: staging
      image_tag: ${{ github.sha }}
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG_STAGING }}

  # ============================================================
  # Deploy → Production (requires GitHub Environment approval)
  # ============================================================
  deploy-veyor-prod:
    name: Deploy / Veyor / Production
    needs: deploy-veyor-staging
    if: needs.deploy-veyor-staging.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project: veyor
      environment: production
      image_tag: ${{ github.sha }}
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}

  deploy-biomedical-prod:
    name: Deploy / BioMedical / Production
    needs: deploy-biomedical-staging
    if: needs.deploy-biomedical-staging.result == 'success'
    uses: ./.github/workflows/reusable-deploy.yml
    with:
      project: biomedical
      environment: production
      image_tag: ${{ github.sha }}
    secrets:
      KUBECONFIG: ${{ secrets.KUBECONFIG_PROD }}
