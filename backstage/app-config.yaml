# ==============================================================================
# Backstage — app-config.yaml
# ==============================================================================
app:
  title: Developer Portal — Platform Engineering
  baseUrl: http://localhost:3000

organization:
  name: Pol Fenollar

backend:
  baseUrl: http://localhost:7007
  listen:
    port: 7007
  csp:
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://localhost:3000
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  database:
    client: better-sqlite3
    connection: ':memory:'

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

catalog:
  import:
    entityFilename: catalog-info.yaml
    pullRequestBranchName: backstage-integration
  rules:
    - allow: [Component, System, API, Resource, Template, Location]
  locations:
    # --- Veyor Marketplace Catalog ---
    - type: file
      target: ../catalog/veyor-catalog.yml
      rules:
        - allow: [Component, System, API, Resource]

    # --- BioMedical AI Catalog ---
    - type: file
      target: ../catalog/biomedical-catalog.yml
      rules:
        - allow: [Component, System, API, Resource]

    # --- Golden Path Templates ---
    - type: file
      target: ../../golden-paths/templates/golden-path-templates.yml
      rules:
        - allow: [Template]

    # --- GitHub Discovery (auto-discover repos) ---
    - type: github-discovery
      target: https://github.com/polfenollar

scaffolder:
  defaultAuthor:
    name: Developer Portal Bot
    email: devportal@veyor.io

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

auth:
  providers:
    github:
      development:
        clientId: ${GITHUB_CLIENT_ID}
        clientSecret: ${GITHUB_CLIENT_SECRET}

proxy:
  endpoints:
    '/grafana':
      target: http://grafana.observability:3000
      headers:
        Authorization: Bearer ${GRAFANA_TOKEN}
