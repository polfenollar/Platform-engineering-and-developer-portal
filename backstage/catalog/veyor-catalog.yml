# --- Veyor REST API ---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: veyor-rest-api
  description: Veyor Marketplace REST API
  tags:
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: polfenollar
  system: veyor-marketplace
  definition: |
    openapi: "3.0.0"
    info:
      title: Veyor Marketplace API
      version: "1.0.0"
    paths:
      /api/auth/register:
        post:
          summary: Register a new user
      /api/auth/login:
        post:
          summary: Authenticate user
      /api/quotes/search:
        post:
          summary: Search for freight quotes
      /api/bookings:
        post:
          summary: Create a booking
      /api/shipments/{id}:
        get:
          summary: Get shipment status
      /api/shipments/{id}/timeline:
        get:
          summary: Get ordered status timeline for a shipment
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
          responses:
            "200":
              description: Shipment timeline
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      shipmentId:
                        type: string
                      events:
                        type: array
                        items:
                          type: object
                          properties:
                            status:
                              type: string
                            description:
                              type: string
                            occurredAt:
                              type: string
                              format: date-time
                            location:
                              type: string
            "404":
              description: Shipment not found
