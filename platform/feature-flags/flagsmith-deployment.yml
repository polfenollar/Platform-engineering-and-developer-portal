# ==============================================================================
# Flagsmith — Self-hosted Feature Flags
# ==============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flagsmith
  namespace: platform
  labels:
    app.kubernetes.io/name: flagsmith
    app.kubernetes.io/part-of: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flagsmith
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flagsmith
    spec:
      containers:
        - name: flagsmith
          image: flagsmith/flagsmith:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql://flagsmith:flagsmith@flagsmith-db:5432/flagsmith"
            - name: DJANGO_ALLOWED_HOSTS
              value: "*"
            - name: ENABLE_ADMIN_ACCESS_USER_PASS
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
        - name: flagsmith-db
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: flagsmith
            - name: POSTGRES_USER
              value: flagsmith
            - name: POSTGRES_PASSWORD
              value: flagsmith
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: flagsmith-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: flagsmith-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: flagsmith
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: flagsmith
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: flagsmith-db
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: flagsmith
  ports:
    - port: 5432
      targetPort: 5432
