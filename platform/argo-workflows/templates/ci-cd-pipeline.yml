# ==============================================================================
# Argo Workflows — CI/CD Pipeline Template
# ==============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: ci-cd-pipeline
  namespace: argo
spec:
  entrypoint: pipeline
  arguments:
    parameters:
      - name: project
        value: "veyor"
      - name: image-tag
        value: "latest"
      - name: registry
        value: "ghcr.io/polfenollar"

  templates:
    - name: pipeline
      dag:
        tasks:
          - name: lint
            template: lint
          - name: unit-test
            template: unit-test
            dependencies: [lint]
          - name: sast-scan
            template: sast-scan
            dependencies: [lint]
          - name: build
            template: build
            dependencies: [unit-test, sast-scan]
          - name: integration-test
            template: integration-test
            dependencies: [build]
          - name: deploy-dev
            template: deploy
            arguments:
              parameters:
                - name: environment
                  value: "dev"
            dependencies: [integration-test]

    - name: lint
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            echo "🔍 Running linters..."
            pip install --quiet ruff
            ruff check . --output-format=github
            echo "✅ Lint passed"

    - name: unit-test
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            echo "🧪 Running unit tests..."
            pip install --quiet pytest pytest-cov
            python -m pytest tests/unit/ -v --cov=src --cov-fail-under=80 --cov-report=term-missing
            echo "✅ Unit tests passed"

    - name: sast-scan
      container:
        image: semgrep/semgrep:latest
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            echo "🔒 Running SAST scan..."
            semgrep scan --config auto --error --json-output=/tmp/semgrep-results.json .
            echo "✅ SAST scan passed — no findings above threshold"

    - name: build
      container:
        image: docker:24-dind
        command: [sh, -c]
        args:
          - |
            echo "🐳 Building Docker image..."
            docker build -t {{workflow.parameters.registry}}/{{workflow.parameters.project}}:{{workflow.parameters.image-tag}} .
            echo "✅ Build complete"

    - name: integration-test
      container:
        image: python:3.11-slim
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            echo "🔗 Running integration tests..."
            pip install --quiet pytest requests
            python -m pytest tests/integration/ -v --timeout=120
            echo "✅ Integration tests passed"

    - name: deploy
      inputs:
        parameters:
          - name: environment
      container:
        image: bitnami/kubectl:latest
        command: [sh, -c]
        args:
          - |
            set -euo pipefail
            echo "🚀 Triggering ArgoCD sync for {{inputs.parameters.environment}}..."
            argocd app sync {{workflow.parameters.project}}-{{inputs.parameters.environment}} \
              --server argocd-server.argocd.svc.cluster.local \
              --auth-token "${ARGOCD_TOKEN}" \
              --timeout 300 \
              --health
            echo "✅ Deployment to {{inputs.parameters.environment}} complete and healthy"
        env:
          - name: ARGOCD_TOKEN
            valueFrom:
              secretKeyRef:
                name: argocd-deploy-token
                key: token
