# Shared GitHub Actions — SAST Scanning Workflow
name: SAST Scan

on:
  workflow_call:
    inputs:
      project:
        description: 'Project to scan (veyor or biomedical)'
        required: true
        type: string

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan Veyor
        if: inputs.project == 'veyor'
        run: semgrep scan --config auto --error --json --output semgrep-results.json projects/veyor-marketplace/
      - name: Scan BioMedical
        if: inputs.project == 'biomedical'
        run: semgrep scan --config auto --error --json --output semgrep-results.json projects/biomedical-ai/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-results
          path: semgrep-results.json

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language:
          - ${{ inputs.project == 'veyor' && 'java-kotlin' || '' }}
          - ${{ inputs.project == 'veyor' && 'javascript-typescript' || '' }}
          - python
          - ${{ inputs.project == 'veyor' && 'go' || '' }}
        exclude:
          - language: ''
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

  trivy:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'projects/'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
