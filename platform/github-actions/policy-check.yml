# Shared GitHub Actions — Kyverno Policy Checking Workflow
name: Policy Check

on:
  workflow_call:

jobs:
  policy-check:
    name: Kyverno Policy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Kyverno CLI
        run: |
          curl -LO https://github.com/kyverno/kyverno/releases/download/v1.12.3/kyverno-cli_v1.12.3_linux_x86_64.tar.gz
          tar -zxf kyverno-cli_v1.12.3_linux_x86_64.tar.gz
          sudo mv kyverno /usr/local/bin/
      - name: Validate Kubernetes Manifests against Policies
        run: |
          kyverno apply platform/governance/kyverno/policies/ \
            --resource platform/llm-gateway/deployment.yml \
            --resource platform/feature-flags/flipt-deployment.yml \
            --resource platform/secrets/openbao/deployment.yml \
            --resource platform/secrets/external-secrets/deployment.yml \
            --resource platform/observability/fluentbit/deployment.yml \
            --resource platform/observability/langfuse/deployment.yml \
            --resource platform/observability/otel-collector/deployment.yml \
            --resource platform/observability/rollback-controller/deployment.yml
