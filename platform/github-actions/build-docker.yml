# Shared GitHub Actions — Docker Build Workflow
name: Docker Build

on:
  workflow_call:
    inputs:
      project:
        description: 'Project to build (veyor or biomedical)'
        required: true
        type: string
      push:
        description: 'Push to registry'
        required: false
        type: boolean
        default: false
      registry:
        description: 'Container registry (ghcr.io or ECR)'
        required: false
        type: string
        default: 'ghcr.io'
    secrets:
      REGISTRY_USERNAME:
        required: false
      REGISTRY_PASSWORD:
        required: false

jobs:
  build-veyor:
    name: Build Veyor Images
    runs-on: ubuntu-latest
    if: inputs.project == 'veyor'
    strategy:
      matrix:
        service:
          - name: veyor-frontend
            context: projects/veyor-marketplace/frontend
            dockerfile: platform/kubernetes/docker/veyor/Dockerfile.frontend
          - name: veyor-backend
            context: projects/veyor-marketplace/backend
            dockerfile: platform/kubernetes/docker/veyor/Dockerfile.backend
          - name: veyor-quoting
            context: projects/veyor-marketplace/quoting-service
            dockerfile: platform/kubernetes/docker/veyor/Dockerfile.quoting
          - name: veyor-agents
            context: projects/veyor-marketplace/agents
            dockerfile: platform/kubernetes/docker/veyor/Dockerfile.agents
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: inputs.push
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ inputs.push }}
          tags: |
            ${{ inputs.registry }}/${{ github.repository_owner }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ github.repository_owner }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-biomedical:
    name: Build BioMedical Images
    runs-on: ubuntu-latest
    if: inputs.project == 'biomedical'
    strategy:
      matrix:
        service:
          - name: biomedical-api
            context: projects/biomedical-ai
            dockerfile: platform/kubernetes/docker/biomedical/Dockerfile.api
          - name: biomedical-workers
            context: projects/biomedical-ai
            dockerfile: platform/kubernetes/docker/biomedical/Dockerfile.workers
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: inputs.push
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: ${{ inputs.push }}
          tags: |
            ${{ inputs.registry }}/${{ github.repository_owner }}/${{ matrix.service.name }}:${{ github.sha }}
            ${{ inputs.registry }}/${{ github.repository_owner }}/${{ matrix.service.name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
