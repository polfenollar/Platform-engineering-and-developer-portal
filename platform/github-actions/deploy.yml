# Shared GitHub Actions — Deploy Workflow with Protection Rules
name: Deploy

on:
  workflow_call:
    inputs:
      project:
        description: 'Project to deploy (veyor or biomedical)'
        required: true
        type: string
      environment:
        description: 'Target environment (dev, staging, prod)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag to deploy'
        required: true
        type: string
    secrets:
      KUBECONFIG:
        required: true
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false

jobs:
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.deploy-url.outputs.url }}
    concurrency:
      group: deploy-${{ inputs.project }}-${{ inputs.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy Veyor services
        if: inputs.project == 'veyor'
        run: |
          NAMESPACE="${{ inputs.project }}-${{ inputs.environment }}"
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          for chart in veyor-frontend veyor-backend veyor-quoting veyor-agents; do
            echo "🚀 Deploying $chart to $NAMESPACE..."
            helm upgrade --install $chart \
              platform/kubernetes/charts/$chart/ \
              --namespace $NAMESPACE \
              --set image.tag=${{ inputs.image_tag }} \
              -f platform/kubernetes/charts/$chart/values-${{ inputs.environment }}.yaml \
              --wait --timeout 5m
          done

      - name: Deploy BioMedical services
        if: inputs.project == 'biomedical'
        run: |
          NAMESPACE="${{ inputs.project }}-${{ inputs.environment }}"
          kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -

          for chart in biomedical-api biomedical-workers; do
            echo "🚀 Deploying $chart to $NAMESPACE..."
            helm upgrade --install $chart \
              platform/kubernetes/charts/$chart/ \
              --namespace $NAMESPACE \
              --set image.tag=${{ inputs.image_tag }} \
              -f platform/kubernetes/charts/$chart/values-${{ inputs.environment }}.yaml \
              --wait --timeout 5m
          done

      - name: Verify deployment
        run: |
          NAMESPACE="${{ inputs.project }}-${{ inputs.environment }}"
          kubectl get pods -n $NAMESPACE
          kubectl rollout status deployment --all -n $NAMESPACE --timeout=120s

      - name: Output deploy URL
        id: deploy-url
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "url=https://${{ inputs.project }}.veyor.io" >> $GITHUB_OUTPUT
          else
            echo "url=https://${{ inputs.environment }}.${{ inputs.project }}.veyor.io" >> $GITHUB_OUTPUT
          fi

  smoke-test:
    name: Post-Deploy Smoke Test
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4
      - name: Health check
        run: |
          NAMESPACE="${{ inputs.project }}-${{ inputs.environment }}"
          echo "🏥 Running health checks..."
          # Wait for services to stabilize
          sleep 30
          # This would hit the actual health endpoints in a real deployment
          echo "✅ Smoke tests passed."
