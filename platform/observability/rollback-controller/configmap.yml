apiVersion: v1
kind: ConfigMap
metadata:
  name: rollback-controller-code
  namespace: platform
data:
  app.py: |
    # ==============================================================================
    # GitOps Rollback Controller — Prometheus Alertmanager Webhook Listener
    # ==============================================================================
    import os
    import json
    import logging
    import base64
    import urllib.request
    import urllib.error
    from http.server import HTTPServer, BaseHTTPRequestHandler

    # Configure logging
    logging.basicConfig(level=logging.INFO, format="%(asctime)s [%(levelname)s] %(message)s")
    logger = logging.getLogger("rollback-controller")

    PORT = int(os.getenv("PORT", 5000))
    GITHUB_TOKEN = os.getenv("GITHUB_TOKEN")
    GITHUB_REPO = os.getenv("GITHUB_REPO") # e.g. "owner/repo"
    GITHUB_BRANCH = os.getenv("GITHUB_BRANCH", "main")
    FILE_PATH = os.getenv("FEATURES_FILE_PATH", "platform/feature-flags/features.json")

    class AlertmanagerWebhookHandler(BaseHTTPRequestHandler):
        def do_POST(self):
            if self.path != "/webhook":
                self.send_response(404)
                self.end_headers()
                return

            content_length = int(self.headers.get('Content-Length', 0))
            body = self.rfile.read(content_length)
            
            try:
                payload = json.loads(body.decode('utf-8'))
                self.process_alerts(payload)
                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"OK")
            except Exception as e:
                logger.error(f"Error processing webhook: {e}")
                self.send_response(500)
                self.end_headers()
                self.wfile.write(str(e).encode('utf-8'))

        def process_alerts(self, payload):
            alerts = payload.get('alerts', [])
            logger.info(f"Received {len(alerts)} alerts from Alertmanager")
            
            for alert in alerts:
                status = alert.get('status')
                labels = alert.get('labels', {})
                alert_name = labels.get('alertname')
                flag_name = labels.get('flag_name')

                if status == 'firing' and flag_name:
                    logger.warning(f"Firing Alert: '{alert_name}' triggered for flag '{flag_name}'. Initiating auto-rollback...")
                    self.rollback_flag(flag_name)

        def rollback_flag(self, flag_name):
            if not GITHUB_TOKEN or not GITHUB_REPO:
                logger.error("GITHUB_TOKEN or GITHUB_REPO environment variables not set. Cannot execute rollback.")
                return

            # 1. Fetch the features file from GitHub API
            url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{FILE_PATH}?ref={GITHUB_BRANCH}"
            headers = {
                "Authorization": f"token {GITHUB_TOKEN}",
                "Accept": "application/vnd.github.v3+json",
                "User-Agent": "GitOps-Rollback-Controller"
            }
            
            req = urllib.request.Request(url, headers=headers)
            try:
                with urllib.request.urlopen(req) as response:
                    file_info = json.loads(response.read().decode('utf-8'))
            except urllib.error.HTTPError as e:
                logger.error(f"Failed to fetch features file: {e.code} - {e.read().decode('utf-8')}")
                return
            except Exception as e:
                logger.error(f"Error fetching features file: {e}")
                return

            sha = file_info.get("sha")
            content_encoded = file_info.get("content", "")
            content_decoded = base64.b64decode(content_encoded).decode('utf-8')
            
            try:
                features = json.loads(content_decoded)
            except Exception as e:
                logger.error(f"Failed to parse JSON features content: {e}")
                return

            # 2. Modify the flag state to disabled
            flag_found = False
            # Expected Flipt / GoFeatureFlag JSON schema: {"flags": [{"key": "flag-name", "enabled": true}]}
            if "flags" in features:
                for flag in features["flags"]:
                    if flag.get("key") == flag_name:
                        if flag.get("enabled") is True:
                            flag["enabled"] = False
                            flag_found = True
                            logger.info(f"Flag '{flag_name}' modified to enabled: false in memory.")
                        else:
                            logger.info(f"Flag '{flag_name}' is already disabled. Skipping rollback.")
                            return

            if not flag_found:
                logger.error(f"Flag '{flag_name}' not found in {FILE_PATH}.")
                return

            # 3. Commit and Push back to GitHub
            updated_content = json.dumps(features, indent=2)
            commit_payload = {
                "message": f"chore(rollback): auto-disable flag '{flag_name}' due to observability alert [skip ci]",
                "content": base64.b64encode(updated_content.encode('utf-8')).decode('utf-8'),
                "sha": sha,
                "branch": GITHUB_BRANCH
            }
            
            commit_url = f"https://api.github.com/repos/{GITHUB_REPO}/contents/{FILE_PATH}"
            req_commit = urllib.request.Request(
                commit_url, 
                data=json.dumps(commit_payload).encode('utf-8'),
                headers={**headers, "Content-Type": "application/json"},
                method="PUT"
            )
            
            try:
                with urllib.request.urlopen(req_commit) as response:
                    logger.info(f"✅ Successfully committed and pushed rollback for flag '{flag_name}' to GitOps repository.")
            except urllib.error.HTTPError as e:
                logger.error(f"Failed to commit rollback: {e.code} - {e.read().decode('utf-8')}")
            except Exception as e:
                logger.error(f"Error committing rollback: {e}")

    def run(server_class=HTTPServer, handler_class=AlertmanagerWebhookHandler):
        server_address = ('', PORT)
        httpd = server_class(server_address, handler_class)
        logger.info(f"Starting GitOps Rollback Webhook Server on port {PORT}...")
        try:
            httpd.serve_forever()
        except KeyboardInterrupt:
            pass
        httpd.server_close()
        logger.info("Server stopped.")

    if __name__ == '__main__':
        run()
