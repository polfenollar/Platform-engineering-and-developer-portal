# ==============================================================================
# Stage 3 — Task 3.5: Langfuse Deployment (LLM Observability)
# Fixes: G12 (no Langfuse), G9 (replaces proprietary LangSmith)
# Langfuse traces every LLM call: model, tokens, latency, cost, agent chain.
# ==============================================================================

# --- Langfuse PostgreSQL PVC ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: langfuse-db-pvc
  namespace: platform
  labels:
    app.kubernetes.io/name: langfuse-db
    app.kubernetes.io/part-of: platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# --- Langfuse PostgreSQL ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-db
  namespace: platform
  labels:
    app.kubernetes.io/name: langfuse-db
    app.kubernetes.io/part-of: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-db
        app.kubernetes.io/part-of: platform
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: langfuse
            - name: POSTGRES_USER
              value: langfuse
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-db-credentials
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "langfuse"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: langfuse-db-pvc
---
# --- Langfuse Server ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse
  namespace: platform
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/part-of: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse
        app.kubernetes.io/part-of: platform
    spec:
      containers:
        - name: langfuse
          image: ghcr.io/langfuse/langfuse:2
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://langfuse:$(POSTGRES_PASSWORD)@langfuse-db.platform.svc.cluster.local:5432/langfuse"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: langfuse-db-credentials
                  key: POSTGRES_PASSWORD
            - name: NEXTAUTH_URL
              value: "http://langfuse.platform.svc.cluster.local:3000"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: NEXTAUTH_SECRET
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-credentials
                  key: SALT
            - name: LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES
              value: "false"
            - name: TELEMETRY_ENABLED
              value: "false"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: platform
  labels:
    app.kubernetes.io/name: langfuse
    app.kubernetes.io/part-of: platform
spec:
  selector:
    app.kubernetes.io/name: langfuse
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse-db
  namespace: platform
spec:
  selector:
    app.kubernetes.io/name: langfuse-db
  ports:
    - port: 5432
      targetPort: 5432
---
# ExternalSecret for Langfuse credentials
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langfuse-secrets
  namespace: platform
  labels:
    app.kubernetes.io/name: langfuse-secrets
    app.kubernetes.io/part-of: platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: langfuse-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: NEXTAUTH_SECRET
      remoteRef:
        key: platform/langfuse
        property: NEXTAUTH_SECRET
    - secretKey: SALT
      remoteRef:
        key: platform/langfuse
        property: SALT
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: langfuse-db-secrets
  namespace: platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: langfuse-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: platform/langfuse-db
        property: POSTGRES_PASSWORD
