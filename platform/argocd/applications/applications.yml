# ==============================================================================
# Argo CD Applications — Veyor Marketplace (dev / staging / prod)
# ==============================================================================

# --- Veyor Dev (auto-sync) ---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: veyor-dev
  namespace: argocd
  labels:
    project: veyor
    environment: dev
spec:
  project: veyor
  source:
    repoURL: https://github.com/polfenollar/developer-portal.git
    targetRevision: main
    path: platform/kubernetes/charts/veyor-backend
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: veyor-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        maxDuration: 3m
        factor: 2
---
# --- Veyor Staging (manual sync) ---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: veyor-staging
  namespace: argocd
  labels:
    project: veyor
    environment: staging
spec:
  project: veyor
  source:
    repoURL: https://github.com/polfenollar/developer-portal.git
    # Phase 0 fix (BN-5): Staging tracks release branch, NOT main.
    targetRevision: release/latest
    path: platform/kubernetes/charts/veyor-backend
    helm:
      valueFiles:
        - values-staging.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: veyor-staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
---
# --- Veyor Production (manual sync, no prune) ---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: veyor-prod
  namespace: argocd
  labels:
    project: veyor
    environment: prod
spec:
  project: veyor
  source:
    repoURL: https://github.com/polfenollar/developer-portal.git
    # Phase 0 fix (BN-5): Prod pinned to tested tag. NEVER use 'main'.
    # Update this tag manually after staging validation.
    targetRevision: v0.1.0
    path: platform/kubernetes/charts/veyor-backend
    helm:
      valueFiles:
        - values-prod.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: veyor-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
---
