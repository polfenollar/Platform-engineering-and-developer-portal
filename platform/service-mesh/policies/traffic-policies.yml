# ==============================================================================
# Istio — Traffic & Authorization Policies
# ==============================================================================

# --- Veyor: Frontend → Backend routing ---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: veyor-backend
  namespace: veyor-dev
spec:
  hosts:
    - veyor-backend
  http:
    - match:
        - uri:
            prefix: /api/
      route:
        - destination:
            host: veyor-backend
            port:
              number: 8080
      timeout: 30s
      retries:
        attempts: 3
        perTryTimeout: 10s
        retryOn: 5xx,reset,connect-failure
---
# --- Canary deployment support ---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: veyor-backend
  namespace: veyor-dev
spec:
  host: veyor-backend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        h2UpgradePolicy: DEFAULT
        maxRequestsPerConnection: 10
    outlierDetection:
      consecutiveGatewayErrors: 5
      interval: 30s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
  subsets:
    - name: stable
      labels:
        version: stable
    - name: canary
      labels:
        version: canary
---
# --- Authorization: Only frontend can call backend ---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: veyor-backend-auth
  namespace: veyor-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: veyor-backend
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/veyor-dev/sa/veyor-frontend"]
        - source:
            principals: ["cluster.local/ns/veyor-dev/sa/veyor-agents"]
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE"]
            paths: ["/api/*"]
---
# --- Authorization: Only backend can call quoting service ---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: veyor-quoting-auth
  namespace: veyor-dev
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: veyor-quoting
  rules:
    - from:
        - source:
            principals: ["cluster.local/ns/veyor-dev/sa/veyor-backend"]
