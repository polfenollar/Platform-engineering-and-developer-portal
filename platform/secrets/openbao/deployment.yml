# ==============================================================================
# Stage 1 — Task 1.1: OpenBao Deployment
# OpenBao is the Linux Foundation fork of HashiCorp Vault (MPL-2.0).
# Dev mode: single replica, auto-unseal (for local/CI only).
# Production: switch to HA + integrated Raft storage.
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openbao-auth-delegator
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openbao
    namespace: platform
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-config
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
data:
  openbao.hcl: |
    # ===========================================================
    # OpenBao server config
    # ENV: dev mode (auto-unseal, in-memory). Switch to raft for prod.
    # ===========================================================
    ui = true

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = 1   # TLS terminated at Istio mTLS layer
    }

    # Development backend — single node, in-memory
    # For production replace with:
    #   storage "raft" {
    #     path = "/openbao/data"
    #     node_id = "openbao-0"
    #   }
    storage "inmem" {}

    api_addr     = "http://openbao.platform.svc.cluster.local:8200"
    cluster_addr = "https://openbao.platform.svc.cluster.local:8201"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openbao
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openbao
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openbao
        app.kubernetes.io/part-of: platform
    spec:
      serviceAccountName: openbao
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: openbao
          image: openbao/openbao:2.0.3
          command:
            - bao
            - server
            - -dev                         # Auto-unseal; remove for production
            - -dev-root-token-id=root      # Fixed dev token; use proper auth for prod
            - -dev-listen-address=0.0.0.0:8200
          ports:
            - containerPort: 8200
              name: http
            - containerPort: 8201
              name: cluster
          env:
            - name: BAO_LOG_LEVEL
              value: "info"
            - name: BAO_LOG_FORMAT
              value: "json"
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&perfstandbyok=true
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /openbao/config
      volumes:
        - name: config
          configMap:
            name: openbao-config
---
apiVersion: v1
kind: Service
metadata:
  name: openbao
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao
    app.kubernetes.io/part-of: platform
spec:
  selector:
    app.kubernetes.io/name: openbao
  ports:
    - name: http
      port: 8200
      targetPort: 8200
    - name: cluster
      port: 8201
      targetPort: 8201
---
# ==============================================================================
# OpenBao Init Job — Seeds secrets into OpenBao on first run.
# Writes the secret paths that ESO's ExternalSecret CRs will reference.
# This job is idempotent: safe to re-run.
# ==============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: openbao-init-secrets
  namespace: platform
  labels:
    app.kubernetes.io/name: openbao-init
    app.kubernetes.io/part-of: platform
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: openbao/openbao:2.0.3
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -euo pipefail
              export BAO_ADDR=http://openbao.platform.svc.cluster.local:8200
              export BAO_TOKEN=root

              echo "⏳ Waiting for OpenBao to be ready..."
              until bao status 2>/dev/null; do sleep 2; done

              echo "🔑 Seeding secrets into OpenBao KV store..."
              bao secrets enable -path=secret kv-v2 2>/dev/null || true

              # --- Flipt Database ---
              bao kv put secret/platform/flipt-db \
                POSTGRES_PASSWORD="${FLIPT_DB_PASSWORD}"

              # --- LiteLLM API Keys ---
              bao kv put secret/platform/litellm \
                OPENAI_API_KEY="${OPENAI_API_KEY}" \
                ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
                GEMINI_API_KEY="${GEMINI_API_KEY}" \
                LITELLM_MASTER_KEY="${LITELLM_MASTER_KEY}"

              # --- LiteLLM Database ---
              bao kv put secret/platform/litellm-db \
                POSTGRES_PASSWORD="${LITELLM_DB_PASSWORD}"

              # --- GitHub Token (rollback controller) ---
              bao kv put secret/platform/github \
                token="${GITHUB_TOKEN}"

              echo "✅ All secrets seeded successfully"
          env:
            - name: FLIPT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: flipt-db-password
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: openai-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: anthropic-api-key
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: gemini-api-key
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: litellm-master-key
            - name: LITELLM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: litellm-db-password
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bootstrap-secrets
                  key: github-token
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
