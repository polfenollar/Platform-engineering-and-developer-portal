# ==============================================================================
# Stage 1 — Task 1.3: ExternalSecret CRs
# Each CR tells ESO: "pull this key from OpenBao and create this K8s Secret."
# Refresh interval: 1h (secrets persist even if OpenBao is temporarily down).
# ==============================================================================

# --- Flipt Database Password ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flipt-db-secret
  namespace: platform
  labels:
    app.kubernetes.io/name: flipt-db-secret
    app.kubernetes.io/part-of: platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: flipt-db-credentials       # K8s Secret name created by ESO
    creationPolicy: Owner             # ESO owns this secret (deletes with ExternalSecret)
    deletionPolicy: Retain            # On ESO delete, keep the K8s Secret for safety
  data:
    - secretKey: POSTGRES_PASSWORD    # Key in K8s Secret
      remoteRef:
        key: platform/flipt-db        # Path in OpenBao KV
        property: POSTGRES_PASSWORD   # Field in OpenBao secret
---
# --- LiteLLM API Keys and Master Key ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-api-keys
  namespace: platform
  labels:
    app.kubernetes.io/name: litellm-api-keys
    app.kubernetes.io/part-of: platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: litellm-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: OPENAI_API_KEY
      remoteRef:
        key: platform/litellm
        property: OPENAI_API_KEY
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: platform/litellm
        property: ANTHROPIC_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: platform/litellm
        property: GEMINI_API_KEY
    - secretKey: LITELLM_MASTER_KEY
      remoteRef:
        key: platform/litellm
        property: LITELLM_MASTER_KEY
---
# --- LiteLLM Database Password ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: litellm-db-secret
  namespace: platform
  labels:
    app.kubernetes.io/name: litellm-db-secret
    app.kubernetes.io/part-of: platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: litellm-db-credentials
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: platform/litellm-db
        property: POSTGRES_PASSWORD
---
# --- GitHub Token (rollback controller slow-path PR creation) ---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-token-secret
  namespace: platform
  labels:
    app.kubernetes.io/name: github-token-secret
    app.kubernetes.io/part-of: platform
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: openbao-cluster-store
    kind: ClusterSecretStore
  target:
    name: github-secrets              # Matches secretKeyRef in rollback-controller/deployment.yml
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: token                # Matches .env[GITHUB_TOKEN].secretKeyRef.key
      remoteRef:
        key: platform/github
        property: token
