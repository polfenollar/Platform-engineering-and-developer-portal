# ==============================================================================
# Stage 1 — Task 1.2: External Secrets Operator (ESO) + ClusterSecretStore
# ESO watches ExternalSecret CRs and syncs secrets from OpenBao into K8s Secrets.
# ClusterSecretStore: cluster-wide, uses OpenBao's Kubernetes auth.
# ==============================================================================

# --- ESO Helm Application (managed by ArgoCD) ---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
spec:
  project: default
  source:
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    targetRevision: "0.9.13"
    helm:
      values: |
        installCRDs: true
        replicaCount: 2
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        webhook:
          replicaCount: 2
        certController:
          replicaCount: 1
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
---
# --- ClusterSecretStore: connects ESO to OpenBao ---
# Uses OpenBao's Kubernetes auth method — no long-lived token needed.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: openbao-cluster-store
  labels:
    app.kubernetes.io/name: openbao-cluster-store
    app.kubernetes.io/part-of: platform
spec:
  provider:
    vault:
      server: "http://openbao.platform.svc.cluster.local:8200"
      path: "secret"                # KV v2 mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"   # Must match the role created in OpenBao
          serviceAccountRef:
            name: "external-secrets"
            namespace: "external-secrets"
