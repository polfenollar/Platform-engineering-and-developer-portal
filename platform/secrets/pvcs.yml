# ==============================================================================
# Stage 1 — PersistentVolumeClaims for all stateful platform services
# Fixes: SPOF-2 (Flipt-DB), SPOF-3 (LiteLLM-DB), SPOF-7 (Prometheus)
# Storage class defaults to cluster default (e.g. standard/gp3).
# For production, set storageClassName to a replicated storage class (e.g. longhorn, rook-ceph).
# ==============================================================================

# --- Flipt PostgreSQL: 1Gi ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flipt-db-pvc
  namespace: platform
  labels:
    app.kubernetes.io/name: flipt-db
    app.kubernetes.io/part-of: platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # storageClassName: longhorn  # Uncomment for production HA storage
---
# --- LiteLLM PostgreSQL: 5Gi (audit logs + model config) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: litellm-db-pvc
  namespace: platform
  labels:
    app.kubernetes.io/name: litellm-db
    app.kubernetes.io/part-of: platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
# --- Prometheus TSDB: 10Gi (15-day retention @ ~100MB/day) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: prometheus-pvc
  namespace: observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: platform
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
