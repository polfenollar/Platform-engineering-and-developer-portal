# Staging overrides for veyor-backend
replicaCount: 2

image:
  pullPolicy: Always

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

env:
  SPRING_PROFILES_ACTIVE: "staging"
  JAVA_OPTS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0"

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: staging.veyor-api.veyor.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: veyor-api-tls
      hosts:
        - staging.veyor-api.veyor.io

podDisruptionBudget:
  enabled: true
  minAvailable: 1
