replicaCount: 1
image:
  repository: ghcr.io/polfenollar/veyor-frontend
  pullPolicy: IfNotPresent
  tag: "latest"
service:
  type: ClusterIP
  port: 3000
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 5
  periodSeconds: 5
env:
  NEXT_PUBLIC_API_URL: "http://veyor-backend:8080"
