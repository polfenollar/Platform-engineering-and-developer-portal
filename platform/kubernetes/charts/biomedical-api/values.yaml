replicaCount: 1
image:
  repository: ghcr.io/polfenollar/biomedical-api
  pullPolicy: IfNotPresent
  tag: "latest"
service:
  type: ClusterIP
  port: 8000
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi
livenessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 20
  periodSeconds: 10
readinessProbe:
  httpGet:
    path: /health
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
env:
  LANGCHAIN_TRACING_V2: "true"
  LANGCHAIN_PROJECT: "biomedical-agents"
  LOG_LEVEL: "INFO"
envFrom:
  - secretRef:
      name: biomedical-secrets
