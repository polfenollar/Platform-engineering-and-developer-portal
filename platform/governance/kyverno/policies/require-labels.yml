apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-labels
  annotations:
    policies.kyverno.io/title: Require Labels
    policies.kyverno.io/category: Workload Governance
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      This policy checks that workloads (Deployments, StatefulSets, DaemonSets, Jobs, CronJobs)
      have the mandatory labels 'app.kubernetes.io/name' and 'app.kubernetes.io/part-of'.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: check-labels
      match:
        any:
          - resources:
              kinds:
                - Deployment
                - StatefulSet
                - DaemonSet
                - Job
                - CronJob
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - argocd
      validate:
        message: "Mandatory labels 'app.kubernetes.io/name' and 'app.kubernetes.io/part-of' are required."
        pattern:
          metadata:
            labels:
              app.kubernetes.io/name: "?*"
              app.kubernetes.io/part-of: "?*"
